services:
  db:
    image: pgvector/pgvector:pg16
    container_name: projects-db
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: projects-api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT}:8000"
    volumes:
      - ../data:/data:ro
      - ../models:/models:ro

  ray:
    build:
      context: ./ray
      dockerfile: Dockerfile
    container_name: projects-ray-serve
    env_file:
      - .env
    ports:
      - "${RAY_SERVE_PORT}:8000"
      - "${DASHBOARD_PORT}:${DASHBOARD_PORT}"
      - "${METRICS_EXPORT_PORT}:8080"
    volumes:
      - ../models:/models:ro
    shm_size: "${RAY_SHM_SIZE}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${NVIDIA_GPU_COUNT}
              capabilities: [gpu]

volumes:
  postgres_data:
