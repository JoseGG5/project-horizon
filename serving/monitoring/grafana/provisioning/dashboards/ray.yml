apiVersion: 1

providers:
  - name: Ray
    orgId: 1
    folder: Ray
    type: file
    disableDeletion: false
    editable: false
    updateIntervalSeconds: 10
    options:
      # Ray generates dashboard JSON files at runtime. Grafana watches this
      # shared volume and imports them automatically once the Ray container
      # copies them out of /tmp/ray/session_latest/metrics/grafana/dashboards.
      # The sync script writes into a nested "dashboards" folder, so Grafana
      # must watch that exact directory or it will miss the imported JSON files.
      path: /var/lib/grafana/dashboards/ray-generated/dashboards
      foldersFromFilesStructure: false
